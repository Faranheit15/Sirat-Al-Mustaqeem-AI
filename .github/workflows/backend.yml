name: Backend

on:
  push:
    branches: [dev]
    paths:
      - "backend/**"
      - ".github/workflows/backend.yml"
  pull_request:
    branches: [dev]
    paths:
      - "backend/**"
      - ".github/workflows/backend.yml"

# Cancel in-progress runs for PRs; queue (don't cancel) for main so deploys
# are never interrupted by a following push.
concurrency:
  group: backend-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read

jobs:
  lint:
    name: Lint & type-check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          enable-caching: true
          cache-dependency-glob: "backend/uv.lock"

      - name: Install dependencies
        run: uv sync --frozen

      - name: Ruff lint
        run: uv run ruff check .

      - name: Ruff format
        run: uv run ruff format --check .

      - name: Mypy
        run: uv run mypy app

  deploy:
    name: Deploy to FastAPI Cloud
    needs: lint
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/dev' && github.event_name == 'push'
    environment: production
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          enable-caching: true
          cache-dependency-glob: "backend/uv.lock"

      - name: Install dependencies
        run: uv sync --frozen --no-dev

      - name: Deploy to FastAPI Cloud
        env:
          FASTAPI_CLOUD_TOKEN: ${{ secrets.FASTAPI_CLOUD_TOKEN }}
        run: uv run fastapi deploy
